<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud-Health Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding-top: 50px; }
        .dashboard { width: 400px; background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        .service { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; }
        .status-online { color: #4ade80; }
        .status-warning { color: #fbbf24; }
        .footer { font-size: 0.8rem; color: #94a3b8; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h2>☁️ Cloud Status ({{ env }})</h2>
        {% for service in services %}
        <div class="service">
            <span>{{ service.name }}</span>
            <span class="{% if service.status == 'Online' %}status-online{% else %}status-warning{% endif %}">
                ● {{ service.status }} ({{ service.latency }})
            </span>
        </div>
        {% endfor %}
        <div class="footer">Last Sync: {{ updated_at }}</div>
    </div>
</body>
</html>
